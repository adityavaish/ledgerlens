name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF##*/}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Strip dev deps
        run: npm prune --omit=dev

      - name: Pack release tarball
        run: |
          # npm pack honors the "files" allowlist in package.json and emits a
          # single .tgz with a "package/" prefix the launcher expects.
          out=$(npm pack --pack-destination .)
          mv "$out" "ledgerlens-${{ steps.ver.outputs.version }}.tgz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ledgerlens-${{ steps.ver.outputs.version }}.tgz
            scripts/install.ps1